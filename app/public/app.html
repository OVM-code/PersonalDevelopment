<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourseCraft — Book to Learning Journey</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>📚 CourseCraft</h1>
      <p id="user-info"></p>
      <div class="header-actions">
        <button id="courses-btn" title="My saved courses">🗂 My courses</button>
        <button id="download-btn" title="Download conversation as Markdown">⬇ Export</button>
        <button id="reset-btn" title="Start over">↺ New course</button>
        <button id="logout-btn" title="Log out">Log out</button>
      </div>
    </div>
  </header>

  <div id="courses-panel" class="courses-panel" hidden>
    <div class="courses-panel-inner">
      <div class="courses-panel-header">
        <h2>My courses</h2>
        <button id="courses-close-btn" title="Close">✕</button>
      </div>
      <p id="courses-empty" class="small" hidden>No saved courses yet — start one below and it'll be saved automatically as you go.</p>
      <ul id="courses-list"></ul>
    </div>
  </div>

  <main id="chat"></main>

  <footer>
    <form id="composer">
      <textarea
        id="input"
        rows="2"
        placeholder="Tell CourseCraft about the book you want to learn… (Enter to send, Shift+Enter for newline)"
      ></textarea>
      <button id="send-btn" type="submit">Send</button>
    </form>
  </footer>

  <script src="app.js"></script>
</body>
</html>
